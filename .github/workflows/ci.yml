name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript typecheck + tests + MCP smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: vitest
        run: npm test
      - name: smoke-test all 4 MCP servers in synthetic mode
        run: |
          set -e
          for srv in pm_memory team_registry slack jira; do
            echo "::group::$srv"
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
              | LOG_LEVEL=error npx tsx mcp_servers/$srv/server.ts \
              | tee /tmp/$srv.out \
              | grep -q '"tools":\[' \
              && echo "$srv: tools/list OK" \
              || (echo "::error::$srv failed tools/list"; cat /tmp/$srv.out; exit 1)
            echo "::endgroup::"
          done

  python:
    name: Python typecheck + tests + golden validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install deps
        run: pip install -r requirements.txt
      - name: mypy strict (_shared + evals)
        run: python -m mypy
      - name: mypy strict (per-agent)
        run: bash scripts/typecheck-agents.sh
      - name: pytest
        run: python -m pytest tests/python -q
      - name: validate golden YAMLs
        run: |
          python -c "
          import yaml, pathlib, sys
          ok = True
          for p in pathlib.Path('evals/golden').glob('*.yaml'):
              data = yaml.safe_load(p.read_text())
              if 'cases' not in data or not isinstance(data['cases'], list):
                  print(f'::error::{p}: missing or malformed cases', file=sys.stderr); ok = False; continue
              for c in data['cases']:
                  if 'id' not in c or 'must_have' not in c:
                      print(f'::error::malformed case in {p}', file=sys.stderr); ok = False
              print(f'{p.name}: {len(data[\"cases\"])} cases OK')
          sys.exit(0 if ok else 1)
          "

  hooks:
    name: PreToolUse / PostToolUse hook smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: gate-jira-writes hook — DRY_RUN allows
        run: |
          out=$(echo '{"tool_name":"mcp__jira__jira_create_issue","tool_input":{"project_key":"PLAN","summary":"x"}}' \
            | DRY_RUN=true node .claude/hooks/gate-jira-writes.mjs)
          if [ -n "$out" ]; then echo "::error::DRY_RUN=true should be silent, got: $out"; exit 1; fi
      - name: gate-jira-writes hook — no DRY_RUN asks
        run: |
          out=$(echo '{"tool_name":"mcp__jira__jira_create_issue","tool_input":{"project_key":"PLAN","summary":"x"}}' \
            | node .claude/hooks/gate-jira-writes.mjs)
          echo "$out" | grep -q '"permissionDecision":"ask"' \
            || (echo "::error::expected ask decision, got: $out"; exit 1)
      - name: gate-jira-writes hook — non-jira tool is silent
        run: |
          out=$(echo '{"tool_name":"Read","tool_input":{"file_path":"/x"}}' \
            | node .claude/hooks/gate-jira-writes.mjs)
          if [ -n "$out" ]; then echo "::error::non-jira tool should be silent, got: $out"; exit 1; fi
