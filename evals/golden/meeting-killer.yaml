# Eval cases for the meeting-killer agent.
#
# Each case provides an input transcript and a set of `must_have` properties
# the LLM judge checks for. Properties are intentionally behavioral
# ("identifies Wendell as a borderline/cut attendance verdict") rather than
# exact-string-match, because the judge is grading the model's reasoning,
# not its phrasing.

cases:
  - id: flexpay_q3_sync
    description: >
      The canonical synthetic transcript bundled with the repo. Hostile case
      design: a VP joins late, a key tech debt surfaces 47 min in, a
      compliance reviewer flags a 6-8 wk blocker the PM hadn't started.
      The agent should call out attendance waste and structural failures
      rather than just summarize what happened.
    input_transcript_path: 01_meeting_killer/transcript.md
    must_have:
      - "Sync score is 7 or below — this meeting was substantially async-doable (rubric tolerates the model's defensible judgment when it's clearly below the 8+ truly-must-be-sync threshold)."
      - "Wendell Ngata is classified as borderline or could_have_been_briefed (joined late, left early, no substantive contribution)."
      - "Action items have explicit owners and a due date."
      - "Followup draft to Wendell or Marcus flags the Q3 commitment as not actually feasible without the structural prerequisites being met."
      - "Structural observations call out at least one of: late surfacing of the client-side eligibility gate, UDAAP review not started, no single owner declared until Priya volunteered."
    must_not_have:
      - "Vague 'good discussion, action items captured' summary with no challenge to the meeting's existence."
      - "Marking Wendell as 'essential' attendance without explanation."
