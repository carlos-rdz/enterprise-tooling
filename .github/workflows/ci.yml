name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript typecheck + MCP smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: install
        run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: smoke-test all 4 MCP servers in synthetic mode
        run: |
          set -e
          for srv in pm_memory team_registry slack jira; do
            echo "::group::$srv"
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
              | npx tsx mcp_servers/$srv/server.ts \
              | tee /tmp/$srv.out \
              | grep -q '"tools":\[' \
              && echo "$srv: tools/list OK" \
              || (echo "::error::$srv failed tools/list"; cat /tmp/$srv.out; exit 1)
            echo "::endgroup::"
          done

  python:
    name: Python syntax + import checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install deps
        run: pip install anthropic pydantic pyyaml
      - name: compile-check every agent
        run: |
          set -e
          for f in 01_meeting_killer/agent.py 02_pm_memory/agent.py 03_cross_team/agent.py 04_oncall_companion/agent.py evals/run.py; do
            python -c "import ast, sys; ast.parse(open('$f').read()); print('$f: syntax OK')"
          done
      - name: import-check (agents don't need API key just to import)
        run: |
          set -e
          python -c "
          import importlib.util, sys
          for f in ['01_meeting_killer/agent.py','02_pm_memory/agent.py','03_cross_team/agent.py','04_oncall_companion/agent.py','evals/run.py']:
              spec = importlib.util.spec_from_file_location('mod', f)
              mod = importlib.util.module_from_spec(spec)
              # Don't run main; just compile the module body so we catch top-level import errors.
              with open(f) as fh:
                  compile(fh.read(), f, 'exec')
              print(f'{f}: compile OK')
          "
      - name: validate golden YAMLs
        run: |
          python -c "
          import yaml, pathlib
          for p in pathlib.Path('evals/golden').glob('*.yaml'):
              data = yaml.safe_load(p.read_text())
              assert 'cases' in data, f'{p} missing cases'
              for c in data['cases']:
                  assert 'id' in c and 'must_have' in c, f'malformed case in {p}'
              print(f'{p.name}: {len(data[\"cases\"])} cases OK')
          "

  hooks:
    name: Hook smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: gate-jira-writes hook — DRY_RUN allows
        run: |
          out=$(echo '{"tool_name":"mcp__jira__jira_create_issue","tool_input":{"project_key":"PLAN","summary":"x"}}' \
            | DRY_RUN=true node .claude/hooks/gate-jira-writes.mjs)
          if [ -n "$out" ]; then echo "::error::DRY_RUN=true should be silent, got: $out"; exit 1; fi
      - name: gate-jira-writes hook — no DRY_RUN asks
        run: |
          out=$(echo '{"tool_name":"mcp__jira__jira_create_issue","tool_input":{"project_key":"PLAN","summary":"x"}}' \
            | node .claude/hooks/gate-jira-writes.mjs)
          echo "$out" | grep -q '"permissionDecision":"ask"' \
            || (echo "::error::expected ask decision, got: $out"; exit 1)
      - name: gate-jira-writes hook — non-jira tool is silent
        run: |
          out=$(echo '{"tool_name":"Read","tool_input":{"file_path":"/x"}}' \
            | node .claude/hooks/gate-jira-writes.mjs)
          if [ -n "$out" ]; then echo "::error::non-jira tool should be silent, got: $out"; exit 1; fi
